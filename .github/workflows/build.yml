name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  APP_NAME: websdr
  CGO_CFLAGS: -Wno-pointer-sign

jobs:
  build-web:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  build:
    name: ${{ matrix.name }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
          - name: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install librtlsdr (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librtlsdr-dev libusb-1.0-0-dev pkg-config

      - name: Install librtlsdr (macOS)
        if: runner.os == 'macOS'
        run: brew install librtlsdr pkg-config

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-rtl-sdr

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.ext }}" \
            ./cmd/websdr

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
          CC: gcc
          PKG_CONFIG: pkg-config
        run: |
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          $env:PKG_CONFIG_PATH = "C:\msys64\mingw64\lib\pkgconfig"
          go build `
            -trimpath `
            -ldflags="-s -w" `
            -o "${{ env.APP_NAME }}-${{ matrix.name }}.exe" `
            ./cmd/websdr

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz" \
            "${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.ext }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ env.APP_NAME }}-${{ matrix.name }}.exe" `
            -DestinationPath "${{ env.APP_NAME }}-${{ matrix.name }}.zip"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload build artifact
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.ext }}
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp -v {} dist/ \;
          ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

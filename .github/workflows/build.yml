name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.24"
  APP_NAME: websdr
  CGO_CFLAGS: -Wno-pointer-sign

jobs:
  build-web:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 7

  build:
    name: ${{ matrix.name }}
    needs: build-web
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            ext: ""
          - name: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        if: runner.os != 'Windows'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install librtlsdr (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y librtlsdr-dev libusb-1.0-0-dev pkg-config

      - name: Install librtlsdr (macOS)
        if: runner.os == 'macOS'
        run: brew install librtlsdr pkg-config

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-go
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-rtl-sdr

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.ext }}" \
            ./cmd/websdr

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
          GOOS: windows
          GOARCH: amd64
        run: |
          pkg-config --exists librtlsdr
          go version
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o "${{ env.APP_NAME }}-${{ matrix.name }}.exe" \
            ./cmd/websdr

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf "${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz" \
            "${{ env.APP_NAME }}-${{ matrix.name }}${{ matrix.ext }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          app="${{ env.APP_NAME }}-${{ matrix.name }}"
          pkgdir="dist/${app}"
          mkdir -p "$pkgdir"
          cp "${app}.exe" "$pkgdir/"

          copy_mingw_dlls() {
            ldd "$1" | awk '/\/mingw64\// {print $1}' | while read -r dll; do
              cp -f "/mingw64/bin/${dll}" "$pkgdir/" 2>/dev/null || true
            done
          }

          copy_mingw_dlls "${app}.exe"
          copy_mingw_dlls /mingw64/bin/librtlsdr.dll
          copy_mingw_dlls /mingw64/bin/libusb-1.0.dll
          echo "Windows release bundle:"
          ls -la "$pkgdir"

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $app = "${{ env.APP_NAME }}-${{ matrix.name }}"
          Compress-Archive -Path "dist/$app/*" -DestinationPath "$app.zip" -Force

      - name: Upload release asset
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            ${{ env.APP_NAME }}-${{ matrix.name }}.tar.gz
            ${{ env.APP_NAME }}-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Compute release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            short="${GITHUB_SHA::7}"
            echo "tag=build-${short}" >> "$GITHUB_OUTPUT"
            echo "name=Build ${short}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: artifacts/
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp -v {} dist/ \;
          ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
